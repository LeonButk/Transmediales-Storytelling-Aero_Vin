<!DOCTYPE html>

<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GLB Test (Modern)</title>
    <style>
        body { margin: 0; overflow: hidden; }
    </style>
    <script type="importmap">
        {
          "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js"
          }
        }
    </script>
</head>
<body>

<script type="module">

    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.158/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/controls/OrbitControls.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.158/examples/jsm/loaders/GLTFLoader.js';

    // Szene
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xdddddd);

    // Kamera
    const camera = new THREE.PerspectiveCamera(
        75,
        window.innerWidth / window.innerHeight,
        0.1,
        1000
    );
    camera.position.set(0, 1, 5);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enableZoom = true;
    controls.enablePan = false;

    // Licht
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 5, 5);
    scene.add(light);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));

    // Loader
    const loader = new GLTFLoader();

    loader.load(
        "models/grapes.glb", // ← DEIN PFAD
        (gltf) => {
            const model = gltf.scene;
            scene.add(model);

            console.log("Modell geladen!", model);
        },
        undefined,
        (error) => {
            console.error("Fehler:", error);
        }
    );

    // Animation
    function animate() {
        requestAnimationFrame(animate);

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // Resize
    window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>

</body>
</html>

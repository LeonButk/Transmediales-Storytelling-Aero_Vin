<!DOCTYPE html>

<html lang="de">
    <head>
        <meta charset="UTF-8">
        <title>AERO VIN - Momentum</title>
        <link rel="stylesheet" href="STYLE/style.css">
        <script src="JS/script.js" defer></script>
    </head>
    <body>
        <div class="scene">
            <div class="carousel">
                <div class="first_carousel__cell">
                    <img src="ASSETS/IMAGES/Aero_Gif.gif" alt="AERO VIN 1">
                </div>
                <div class="carousel__cell">
                    <img src="ASSETS/IMAGES/AERO_VIN_2.jpg" alt="AERO VIN 2">
                </div>
                <div class="carousel__cell">
                    <img src="ASSETS/IMAGES/AERO_VIN_3.jpg" alt="AERO VIN 3">
                </div>
                <div class="carousel__cell">
                    <img src="ASSETS/IMAGES/AERO_VIN_4.jpg" alt="AERO VIN 4">
                </div>
                <div class="carousel__cell">
                    <img src="ASSETS/IMAGES/AERO_VIN_5.jpg" alt="AERO VIN 5">
                </div>
                <div class="carousel__cell">
                    <h1>Kopfzeile</h1>
                    Hier ist cooler text</div>
                <div class="carousel__cell">7</div>
                <div class="carousel__cell">8</div>
                <div class="carousel__cell">9</div>
                <div class="carousel__cell">10</div>
                <div class="carousel__cell">11</div>
                <div class="carousel__cell">12</div>
                <div class="carousel__cell">13</div>
                <div class="carousel__cell">14</div>
                <div class="carousel__cell">15</div>
            </div>
        </div>

        <div class="lightbox" aria-hidden="true">
            <button class="lightbox__close" type="button" aria-label="Lightbox schliessen">x</button>
            <iframe
                class="lightbox__video"
                data-src="https://www.youtube-nocookie.com/embed/HvguTsCrz6U?si=agQxIJnhEPidXTbi"
                title="AERO VIN Video"
                allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                referrerpolicy="strict-origin-when-cross-origin"
                allowfullscreen
            ></iframe>
        </div>

        <div class="descriptions" aria-hidden="true">
            <div class="desciption_cell">
                <div class="cellTitel">
                    ÆRØ VIN
                </div>
                <div class="cellLead">
                    Erleben sie, wie die Kraft eines Momentums etwas verändern kann
                </div>
            </div>
            <div class="description_cell">
                <div class="cellTitel">
                    Vinemaker for a day
                </div>
                <div class="cellLead">
                    Guido zeigt uns wie es ist, einen Tag lang auf dem Weinberg zu arbeiten
                </div>
            </div>
        </div>

        <div class="carousel-options">
            <p>
                <button class="previous-button">Previous</button>
                <button class="next-button">Next</button>
            </p>
        </div>
    </body>
</html>
